@if (store.account.signedIn) {
  @if (dropVisible || dropActive || dropFilled) {
    <div class="clipboard-drop-zone"
         [class.active]="dropActive"
         [class.filled]="dropFilled"
         (dragover)="dragOver($event)"
         (dragleave)="dragLeave($event)"
         (drop)="drop($event)"
         aria-label="Drop to clipboard"
         i18n-aria-label>📋️</div>
  }
  @if (items.length) {
    <div class="clipboard-bubbles" aria-label="Clipboard items" i18n-aria-label>
      @for (item of items; track item.id) {
        <div class="clipboard-bubble"
             cdkOverlayOrigin
             #bubbleOrigin="cdkOverlayOrigin"
             [class.selected]="item.selected"
             [class.hold]="item.hold"
             [style.left.px]="item.x"
             [style.top.px]="item.y"
             (click)="select(item)"
             (contextmenu)="openEdit(item, $event)"
             (pointerdown)="pointerDown($event, item)"
             (pointermove)="pointerMove($event)"
             (pointerup)="pointerUp($event)"
             (pointercancel)="cancelPointerDrag($event)"
             (lostpointercapture)="cancelPointerDrag($event)">
           @if (item.selected) {
             <label class="clipboard-hold"
                    i18n-title title="Keep selected after paste"
                    (click)="$event.stopPropagation()">
               <input #holdCheckbox
                      type="checkbox"
                      [checked]="item.hold"
                      (change)="setHold(item, holdCheckbox.checked, $event)"
                      aria-label="Keep selected after paste"
                      i18n-aria-label>
             </label>
           }
           <button type="button" class="clipboard-preview" [title]="previewText(item)" [attr.aria-label]="previewLabel(item)">{{ preview(item) }}</button>
           @if (item.selected) {
             <button type="button"
                     class="clipboard-clear"
                     (click)="clear(item, $event)"
                     aria-label="Clear clipboard item"
                     i18n-aria-label>×</button>
           }
           <ng-template cdkConnectedOverlay
                        [cdkConnectedOverlayOrigin]="bubbleOrigin"
                        [cdkConnectedOverlayOpen]="editingItem === item"
                        [cdkConnectedOverlayHasBackdrop]="true"
                        [cdkConnectedOverlayPanelClass]="'clipboard-edit-overlay-panel'"
                        (backdropClick)="closeEdit()">
             <form class="clipboard-edit-popup"
                   [formGroup]="editForm"
                   (click)="$event.stopPropagation()"
                   (contextmenu)="$event.stopPropagation()"
                   (keydown.escape)="closeEdit($event)"
                   (ngSubmit)="saveEdit($event)">
               <div class="clipboard-edit-header">
                 <h2 i18n>Edit clipboard Ref</h2>
                 <button type="button"
                         class="clipboard-edit-close"
                         (click)="closeEdit($event)"
                         aria-label="Close clipboard Ref editor"
                         i18n-aria-label>×</button>
               </div>
               <app-ref-form class="clipboard-ref-form" [group]="editForm"></app-ref-form>
               <div class="clipboard-edit-buttons">
                 <button type="submit" i18n>save</button>
                 <button type="button" class="clipboard-edit-cancel" (click)="closeEdit($event)" i18n>cancel</button>
               </div>
             </form>
           </ng-template>
         </div>
       }
     </div>
  }
}
